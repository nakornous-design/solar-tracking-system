<style>
  :root{
    --navy:#081a44;
    --navy-2:#0e245c;
    --bg:#f4f7fb;
    --card:#ffffff;
    --line:#e6ebf2;
    --text:#172033;
    --muted:#708097;
    --blue:#2f6fed;
    --green:#22a06b;
    --amber:#f5a524;
    --red:#e5484d;
    --slate:#7e8ba3;
    --radius-xl:20px;
    --radius-lg:16px;
    --radius-md:12px;
    --shadow:0 8px 24px rgba(15, 23, 42, .06);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .hidden{display:none !important}

  /* LOGIN */
  .login-shell{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    background:linear-gradient(135deg,#eef3fb,#f8fbff);
  }

  .login-wrap{
    width:min(100%,980px);
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:24px;
    align-items:stretch;
  }

  .login-brand{
    background:linear-gradient(180deg,var(--navy),var(--navy-2));
    color:#fff;
    border-radius:28px;
    padding:32px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-shadow:var(--shadow);
  }

  .login-brand-icon{
    width:68px;
    height:68px;
    border-radius:18px;
    background:rgba(255,255,255,.10);
    display:grid;
    place-items:center;
    font-size:34px;
    margin-bottom:18px;
  }

  .login-brand-title{
    font-size:36px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:10px;
  }

  .login-brand-sub{
    color:rgba(255,255,255,.78);
    font-size:16px;
    line-height:1.5;
  }

  .login-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:28px;
    padding:28px;
    box-shadow:var(--shadow);
    align-self:center;
  }

  .login-card-title{
    font-size:30px;
    font-weight:800;
    margin-bottom:6px;
  }

  .login-card-sub{
    color:var(--muted);
    margin-bottom:18px;
  }

  /* APP SHELL */
  .app-shell{
    min-height:100vh;
    display:grid;
    grid-template-columns:260px 1fr;
  }

  .sidebar{
    background:linear-gradient(180deg,var(--navy),var(--navy-2));
    color:#fff;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
  }

  .brand{
    display:flex;
    gap:12px;
    align-items:center;
    padding:10px 10px 18px;
    border-bottom:1px solid rgba(255,255,255,.10);
    margin-bottom:14px;
  }

  .brand-icon{
    width:44px;
    height:44px;
    border-radius:14px;
    background:rgba(255,255,255,.10);
    display:grid;
    place-items:center;
    font-size:24px;
  }

  .brand-title{
    font-size:18px;
    font-weight:800;
    line-height:1.1;
  }

  .brand-sub{
    font-size:12px;
    color:rgba(255,255,255,.72);
  }

  .sidebar-nav{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .nav-btn{
    border:none;
    background:transparent;
    color:#fff;
    text-align:left;
    padding:12px 14px;
    border-radius:14px;
    font-size:15px;
    cursor:pointer;
    transition:.18s ease;
  }

  .nav-btn:hover{
    background:rgba(255,255,255,.08);
  }

  .nav-btn.active{
    background:var(--blue);
  }

  .sidebar-footer{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,.10);
  }

  .sidebar-user{
    display:flex;
    gap:10px;
    align-items:center;
    border:1px solid rgba(255,255,255,.10);
    border-radius:16px;
    padding:10px;
    margin-bottom:12px;
  }

  .avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#fff;
    color:var(--navy);
    display:grid;
    place-items:center;
    font-weight:800;
  }

  .sidebar-user-name{
    font-weight:700;
    font-size:14px;
  }

  .sidebar-user-role{
    font-size:12px;
    color:rgba(255,255,255,.72);
  }

  .main-shell{
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .topbar{
    background:#fff;
    border-bottom:1px solid var(--line);
    padding:20px 28px;
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:center;
    position:sticky;
    top:0;
    z-index:10;
  }

  .page-title{
    font-size:34px;
    font-weight:800;
    letter-spacing:-.02em;
  }

  .page-subtitle{
    margin-top:4px;
    color:var(--muted);
    font-size:14px;
  }

  .content-area{
    padding:24px 28px 40px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .view-section{
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  /* COMMON */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    box-shadow:var(--shadow);
    padding:18px;
  }

  .section-title{
    font-size:24px;
    font-weight:800;
    margin-bottom:14px;
  }

  .muted{
    color:var(--muted);
  }

  .form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .form-group label{
    font-size:13px;
    color:var(--muted);
    font-weight:700;
  }

  .input{
    width:100%;
    min-height:44px;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fff;
    padding:0 14px;
    color:var(--text);
    font-size:14px;
  }

  .btn{
    min-height:44px;
    padding:0 16px;
    border:none;
    border-radius:12px;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
  }

  .btn-primary{
    background:var(--blue);
    color:#fff;
  }

  .btn-secondary{
    background:#eef3fb;
    color:var(--text);
    border:1px solid var(--line);
  }

  .btn-danger{
    background:var(--red);
    color:#fff;
  }

  .btn-block{
    width:100%;
  }

  .message{
    padding:12px 14px;
    border-radius:14px;
    background:#fff7e8;
    border:1px solid #ffd89a;
    color:#9a5b00;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    padding:6px 10px;
    font-size:12px;
    font-weight:800;
    line-height:1;
    white-space:nowrap;
  }

  .badge-blue{background:#e9f0ff;color:var(--blue)}
  .badge-green{background:#e9f8f1;color:var(--green)}
  .badge-amber{background:#fff4df;color:#b77000}
  .badge-red{background:#ffe8ea;color:var(--red)}
  .badge-slate{background:#eef1f6;color:#66758c}

  .list-line{
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }

  .list-line:last-child{
    border-bottom:none;
  }

  /* KPI / DASHBOARD */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(5,minmax(0,1fr));
    gap:16px;
  }

  .kpi-card{
    min-height:120px;
  }

  .kpi-label{
    color:var(--muted);
    font-size:14px;
    margin-bottom:10px;
  }

  .kpi-value{
    font-size:34px;
    font-weight:800;
  }

  .two-col{
    display:grid;
    grid-template-columns:1.2fr .8fr;
    gap:16px;
  }

  .stage-chip-row,
  .quick-chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .stage-chip,
  .quick-chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#f7f9fd;
    font-weight:700;
    font-size:13px;
  }

  /* TABLE / PROJECTS */
  .filter-grid{
    display:grid;
    grid-template-columns:repeat(6,minmax(0,1fr));
    gap:12px;
  }

  .table-wrap{
    overflow:auto;
  }

  .data-table{
    width:100%;
    min-width:1000px;
    border-collapse:collapse;
  }

  .data-table th,
  .data-table td{
    padding:14px 12px;
    border-bottom:1px solid var(--line);
    text-align:left;
    vertical-align:middle;
    font-size:14px;
  }

  .data-table th{
    color:var(--muted);
    background:#fbfcfe;
    font-weight:800;
  }

  .progress-wrap{
    width:100%;
    max-width:120px;
  }

  .progress-text{
    font-size:12px;
    font-weight:700;
    margin-bottom:6px;
    color:var(--muted);
  }

  .progress-bar{
    width:100%;
    height:8px;
    background:#e9eef6;
    border-radius:999px;
    overflow:hidden;
  }

  .progress-fill{
    height:100%;
    background:var(--blue);
    border-radius:999px;
  }

  /* PROJECT DETAIL */
  .detail-header{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:flex-start;
  }

  .detail-header-right{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .metric-box{
    min-width:140px;
    border:1px solid var(--line);
    border-radius:14px;
    background:#fafcff;
    padding:12px 14px;
  }

  .metric-progress-box{
    min-width:180px;
  }

  .metric-label{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
  }

  .metric-value{
    font-size:16px;
    font-weight:800;
  }

  .current-stage-card{
    background:linear-gradient(180deg,#ffffff,#fbfdff);
  }

  .current-stage-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:14px;
  }

  .current-stage-label{
    font-size:13px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:4px;
  }

  .current-stage-name{
    font-size:28px;
    font-weight:800;
    letter-spacing:-.02em;
  }

  .current-stage-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
  }

  .info-tile{
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    background:#fff;
  }

  .info-label{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
  }

  .info-value{
    font-size:14px;
    font-weight:700;
    word-break:break-word;
  }

  .milestone-wrap{
    display:flex;
    gap:0;
    overflow:auto;
    padding:8px 2px 2px;
  }

  .milestone-step{
    min-width:120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    text-align:center;
    padding-right:18px;
  }

  .milestone-step:last-child{
    padding-right:0;
  }

  .milestone-step:not(:last-child)::after{
    content:"";
    position:absolute;
    top:18px;
    left:66px;
    width:72px;
    height:3px;
    background:#d9e2f0;
    border-radius:999px;
  }

  .milestone-dot{
    width:36px;
    height:36px;
    border-radius:50%;
    display:grid;
    place-items:center;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
    border:2px solid #d9e2f0;
    background:#fff;
    color:var(--slate);
    z-index:1;
  }

  .milestone-title{
    font-size:12px;
    font-weight:800;
    color:var(--text);
    line-height:1.25;
  }

  .milestone-sub{
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
  }

  .milestone-step.done .milestone-dot{
    background:var(--green);
    border-color:var(--green);
    color:#fff;
  }

  .milestone-step.current .milestone-dot{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
    box-shadow:0 0 0 6px rgba(47,111,237,.12);
  }

  .milestone-step.future .milestone-dot{
    background:#fff;
    color:var(--slate);
  }

  .milestone-step.done:not(:last-child)::after{
    background:var(--green);
  }

  .detail-main-grid{
    display:grid;
    grid-template-columns:1.15fr .85fr;
    gap:16px;
  }

  .left-stack,.right-stack{
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .summary-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .summary-row{
    display:grid;
    grid-template-columns:160px 1fr;
    gap:12px;
    align-items:start;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }

  .summary-row:last-child{
    border-bottom:none;
    padding-bottom:0;
  }

  .summary-key{
    color:var(--muted);
    font-size:13px;
    font-weight:700;
  }

  .summary-val{
    font-size:14px;
    font-weight:700;
    word-break:break-word;
  }

  .timeline-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .timeline-item{
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    background:#fff;
  }

  .timeline-top{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .timeline-stage{
    font-size:15px;
    font-weight:800;
  }

  .timeline-meta{
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
  }

  /* RESPONSIVE */
  @media (max-width: 1200px){
    .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .filter-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .two-col{grid-template-columns:1fr}
    .detail-main-grid{grid-template-columns:1fr}
    .detail-header{flex-direction:column}
    .current-stage-grid{grid-template-columns:1fr}
  }

  @media (max-width: 900px){
    .app-shell{grid-template-columns:1fr}
    .sidebar{display:none}
    .topbar{padding:16px}
    .content-area{padding:16px}
    .page-title{font-size:26px}
    .login-wrap{grid-template-columns:1fr}
    .login-brand{display:none}
    .summary-row{grid-template-columns:1fr;gap:4px}
    .metric-box,.metric-progress-box{min-width:unset;width:100%}
    .detail-header-right{width:100%}
  }
</style>
