<section id="view-projects" class="view-section hidden">
  <div class="card">
    <div class="section-title">Projects</div>
    <div class="quick-chip-row" style="margin-bottom:14px;"><span class="quick-chip">All Projects</span><span class="quick-chip">Overdue</span><span class="quick-chip">Billing Pending</span><span class="quick-chip">My Projects</span></div>
    <div class="filter-grid">
      <input id="filterProjectId" class="input" placeholder="Project ID">
      <input id="filterKeyword" class="input" placeholder="Project / Customer">
      <select id="filterPaymentType" class="input"><option value="">Payment Type</option><option value="CASH">CASH</option><option value="LOAN">LOAN</option></select>
      <input id="filterStageCode" class="input" placeholder="Current Stage">
      <input id="filterStatusCode" class="input" placeholder="Current Status">
      <div style="display:flex;gap:10px;"><button id="btnSearchProjects" class="btn btn-primary" style="flex:1;">Search</button><button id="btnClearProjectFilters" class="btn btn-secondary" style="flex:1;">Clear</button></div>
    </div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Project ID</th><th>Project Name</th><th>Payment</th><th>Current Stage</th><th>Current Status</th><th>Owner</th><th>Progress</th><th>Risk</th><th>Action</th></tr></thead>
        <tbody id="projectListBody"><tr><td colspan="9" class="muted">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</section>
